<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sama Health | Inscription</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray">
    <nav class="navbar static">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-heart-pulse"></i></div>
                <span>Sama<span>Health</span></span>
            </a>
            <a href="login.html" class="btn btn-outline btn-sm">
                Connexion
            </a>
        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="auth-card wider reveal-on-scroll">
            <div class="auth-header">
                <h1>Créer un compte</h1>
                <p>Rejoignez des milliers de Sénégalais qui gagnent du temps.</p>
            </div>

            <form id="signup-form" class="spacing-md">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Prénom</label>
                        <input type="text" name="firstName" class="form-input" placeholder="Ex: Moussa" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nom</label>
                        <input type="text" name="lastName" class="form-input" placeholder="Ex: Diop" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Adresse Email</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" class="form-input" placeholder="moussa.diop@mail.sn" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Numéro de Téléphone</label>
                    <div class="input-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" name="phone" class="form-input" placeholder="77 000 00 00" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <div class="password-strength-meter">
                        <div class="meter-bar"></div>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">J'accepte les <a href="#">conditions d'utilisation</a></label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Créer mon compte <i class="fas fa-user-plus"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>Déjà inscrit ? <a href="login.html">Connectez-vous ici</a></p>
            </div>
        </div>
    </main>

    <script src="datamanager.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('signup-form');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const isValid = FormValidator.validate('signup-form', {
                    firstName: { required: true },
                    lastName: { required: true },
                    email: { required: true, email: true },
                    password: { required: true, min: 6 },
                    phone: { required: true }
                });

                if (!isValid) return;

                const formData = new FormData(form);
                const userData = {
                    fullName: `${formData.get('firstName')} ${formData.get('lastName')}`,
                    email: formData.get('email'),
                    phone: formData.get('phone'),
                    password: formData.get('password')
                };

                const result = window.dataManager.signup(userData);

                if (result.success) {
                    window.ui.showNotification("Compte créé avec succès !", "success");
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    window.ui.showNotification(result.message, "error");
                }
            });

            // Basic password strength visual
            const passwordInput = form.querySelector('[name="password"]');
            const meterBar = document.querySelector('.meter-bar');

            passwordInput.addEventListener('input', (e) => {
                const val = e.target.value;
                let strength = 0;
                if (val.length > 5) strength = 33;
                if (val.length > 8 && /[A-Z]/.test(val)) strength = 66;
                if (val.length > 10 && /[!@#$%^&*]/.test(val)) strength = 100;

                meterBar.style.width = strength + '%';
                meterBar.style.backgroundColor = strength < 40 ? '#ef4444' : (strength < 70 ? '#f59e0b' : '#10b981');
            });
        });
    </script>
</body>

</html>
